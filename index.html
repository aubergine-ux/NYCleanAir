<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NYCleanAir | Dashboard </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>New York City Air Quality Status by NYCleanAir</h1>
    <p class="sub" id="updated">Loading Current Conditions…</p>
  </header>

<div id="main">
  <div class="hero">
      <div class="aqi-number" id="aqi-number"></div>
      <div class="aqi-category" id="aqi-category"></div>
      <div class="aqi-verdict" id="aqi-verdict"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="chart-card">
      <div class="chart-title">Last 24 hours</div>
      <div class="chart-hint">US AQI, Hour by Hour | Is it getting Better or Worse?</div>
      <div class="chart-box"><canvas id="trend"></canvas></div>
  </div>
</div>

  <footer>
    Data from the <a href="https://open-meteo.com/en/docs/air-quality-api" target="_blank" rel="noopener">Open-Meteo Air Quality API</a>,
    <br />
    AQI uses the US EPA scale.
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="index.js"></script>
</body>
</html>
